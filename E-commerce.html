<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Shop Base</title>

<style>
body {
    font-family: Arial;
}

.prodotto {
    border: 1px solid black;
    margin: 5px;
    padding: 5px;
}
</style>

</head>

<body>

<h1>Negozio</h1>

<h2>Prodotti</h2>
<div id="prodotti"></div>

<h2>Carrello</h2>
<ul id="carrello"></ul>

<script>

// prodotti (array semplice)
let prodotti = ["Maglietta", "Scarpe", "Cappello"];

// carrello vuoto
let carrello = [];

// funzione per mostrare prodotti
function mostraProdotti() {
    let div = document.getElementById("prodotti");

    for (let i = 0; i < prodotti.length; i++) {

        div.innerHTML = div.innerHTML +
        "<div class='prodotto'>" +
        prodotti[i] +
        " <button onclick='aggiungi(" + i + ")'>Aggiungi</button>" +
        "</div>";
    }
}

// aggiungi al carrello
function aggiungi(i) {
    carrello.push(prodotti[i]);
    aggiornaCarrello();
}

// aggiorna lista carrello
function aggiornaCarrello() {
    let lista = document.getElementById("carrello");
    lista.innerHTML = "";

    for (let i = 0; i < carrello.length; i++) {
        lista.innerHTML = lista.innerHTML + "<li>" + carrello[i] + "</li>";
    }
}

// avvio
mostraProdotti();

</script>

</body>
</html>
