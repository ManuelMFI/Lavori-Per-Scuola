<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Shop Base</title>

<style>
body {
    font-family: Arial;
    text-align: center;
}

h1 {
    color: darkblue;
}

#prodotti, #carrello {
    margin: 20px;
}

.prodotto {
    border: 1px solid black;
    padding: 10px;
    margin: 10px;
}

button {
    padding: 5px 10px;
    cursor: pointer;
}
</style>

</head>

<body>

<h1>Negozio Online</h1>

<h2>Prodotti</h2>
<div id="prodotti"></div>

<h2>Carrello</h2>
<ul id="carrello"></ul>

<script>

// LISTA PRODOTTI (semplice)
let prodotti = ["Maglietta", "Scarpe", "Cappello"];

// CARRELLO
let carrello = [];

// MOSTRA PRODOTTI
function mostraProdotti() {
    let div = document.getElementById("prodotti");

    for (let i = 0; i < prodotti.length; i++) {
        div.innerHTML += `
            <div class="prodotto">
                <p>${prodotti[i]}</p>
                <button onclick="aggiungi(${i})">Aggiungi</button>
            </div>
        `;
    }
}

// AGGIUNGI AL CARRELLO
function aggiungi(index) {
    carrello.push(prodotti[index]);
    aggiornaCarrello();
}

// MOSTRA CARRELLO
function aggiornaCarrello() {
    let lista = document.getElementById("carrello");
    lista.innerHTML = "";

    for (let i = 0; i < carrello.length; i++) {
        lista.innerHTML += "<li>" + carrello[i] + "</li>";
    }
}

// AVVIO
mostraProdotti();

</script>

</body>
</html>
